<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mugdha Deodhar | Data Analyst</title>
<meta name="description" content="Data Analyst specializing in Healthcare and Supply Chain Analytics. SQL, Power BI, Excel, Python.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

body{
font-family:'Poppins',sans-serif;
color:#0f172a;
background:#ffffff;
padding-top:90px;
line-height:1.6;
overflow-x:hidden;
}

/* Modern reveal animation */

section{
padding:110px 20px;
max-width:1200px;
margin:0 auto;
scroll-margin-top:120px;
opacity:0;
transform:translateY(70px);
transition:all .9s cubic-bezier(.17,.67,.83,.67);
}

section.visible{
opacity:1;
transform:translateY(0);
}

h2{
font-size:38px;
font-weight:700;
margin-bottom:60px;
position:relative;
}

h2::after{
content:"";
width:80px;
height:4px;
background:#2563eb;
position:absolute;
bottom:-14px;
left:0;
border-radius:4px;
}

/* ================= NAVBAR ================= */

header{
position:fixed;
width:100%;
top:0;
background:#2563eb;
z-index:1000;
box-shadow:0 8px 30px rgba(37,99,235,.25);
transition:.3s;
}

.navbar{
max-width:1200px;
margin:0 auto;
padding:18px 20px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo a{
color:#fff;
text-decoration:none;
font-size:20px;
font-weight:600;
letter-spacing:.5px;
}

.nav-links{
list-style:none;
display:flex;
gap:28px;
}

.nav-links a{
color:#e0e7ff;
text-decoration:none;
font-size:15px;
transition:.3s;
position:relative;
}

.nav-links a.active,
.nav-links a:hover{
color:#fff;
}

.nav-links a.active::after{
content:"";
position:absolute;
left:0;
bottom:-8px;
width:100%;
height:3px;
background:#ffffff;
border-radius:4px;
}

/* ================= HERO ================= */

.hero{
background:linear-gradient(135deg,#e0e7ff,#f1f5ff);
padding:170px 20px 160px;
}

.hero-container{
max-width:1200px;
margin:0 auto;
display:flex;
align-items:center;
gap:80px;
}

.hero-text h1{
font-size:56px;
font-weight:700;
margin-bottom:20px;
}

.hero-text h2{
font-size:21px;
color:#475569;
margin-bottom:30px;
}

.hero-text p{
font-size:17px;
margin-bottom:45px;
max-width:550px;
color:#475569;
}

.hero-buttons{display:flex;gap:18px}

.btn-primary,.btn-secondary,.btn-outline{
padding:13px 26px;
border-radius:10px;
text-decoration:none;
font-weight:600;
transition:.3s ease;
}

.btn-primary{
background:#2563eb;
color:#fff;
box-shadow:0 8px 25px rgba(37,99,235,.35);
}

.btn-primary:hover{
background:#1e40af;
transform:translateY(-3px);
}

.btn-secondary{
background:#0f172a;
color:#fff;
}

.btn-secondary:hover{
transform:translateY(-3px);
}

.btn-outline{
border:2px solid #2563eb;
color:#2563eb;
}

.btn-outline:hover{
background:#2563eb;
color:#fff;
transform:translateY(-3px);
}

.hero-image img{
width:300px;
border-radius:20px;
box-shadow:0 35px 80px rgba(37,99,235,.25);
}

/* ================= ABOUT ================= */

.about-container{display:flex;gap:60px}
.about-text p{margin-bottom:20px;color:#475569}

.approach-block{
margin-top:35px;
padding:28px;
background:#f1f5ff;
border-left:6px solid #2563eb;
border-radius:14px;
box-shadow:0 15px 35px rgba(37,99,235,.08);
}

.highlight-card{
background:#f1f5ff;
padding:22px;
border-radius:14px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.05);
}

/* ================= SKILLS ================= */

.skills-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:35px;
}

.skill-card{
background:#fff;
padding:30px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,.05);
transition:.4s;
}

.skill-card:hover{
transform:translateY(-10px);
}

.skill-tags span,
.project-tags span{
display:inline-block;
background:#e0e7ff;
color:#2563eb;
padding:7px 16px;
border-radius:25px;
font-size:13px;
margin:6px 8px 6px 0;
}

/* ================= PROJECTS ================= */

.projects-section{background:#f8fafc}
.projects-grid{display:flex;flex-direction:column;gap:80px}

.project-card{
display:grid;
grid-template-columns:1fr 1.2fr;
gap:70px;
background:#fff;
padding:70px;
border-radius:26px;
box-shadow:0 30px 80px rgba(0,0,0,.08);
transition:.4s;
}

.project-card:hover{
transform:translateY(-8px);
}

.project-reverse{direction:rtl}
.project-reverse>*{direction:ltr}

.project-image-wrapper img{
width:100%;
border-radius:20px;
transition:.5s;
}

.project-image-wrapper img:hover{
transform:scale(1.08);
}

.project-impact{
background:linear-gradient(135deg,#e0e7ff,#f1f5ff);
padding:26px;
border-left:6px solid #2563eb;
border-radius:16px;
margin-bottom:30px;
box-shadow:0 20px 45px rgba(37,99,235,.12);
}

.project-link{
text-decoration:none;
color:#2563eb;
font-weight:600;
}

/* ================= CERTIFICATES ================= */

.certificates-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:35px;
}

.certificate-card img{
width:100%;
border-radius:16px;
margin-bottom:12px;
transition:.4s;
}

.certificate-card img:hover{
transform:scale(1.06);
}

/* ================= CONTACT ================= */

.contact-section{
background:#f1f5ff;
text-align:center;
}

.contact-buttons{
margin-top:35px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:18px;
}

/* ================= FOOTER ================= */

footer{
background:#2563eb;
color:#fff;
text-align:center;
padding:20px;
font-size:14px;
}

/* ================= RESPONSIVE ================= */

@media(max-width:992px){
.hero-container,
.about-container,
.project-card{
flex-direction:column;
grid-template-columns:1fr;
text-align:center;
}
.project-reverse{direction:ltr}
}

</style>
</head>

<body>

<header>
<nav class="navbar">
<div class="logo"><a href="#">Mugdha Deodhar</a></div>
<ul class="nav-links">
<li><a href="#about">About</a></li>
<li><a href="#skills">Skills</a></li>
<li><a href="#projects">Projects</a></li>
<li><a href="#certificates">Certificates</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>
</header>

<!-- KEEP YOUR FULL ABOUT, SKILLS, PROJECTS, CERTIFICATES, CONTACT SECTIONS EXACTLY AS THEY ARE HERE -->

<footer>
© 2026 Mugdha Deodhar | Data Analyst Portfolio
</footer>

<script>

/* Active Nav Highlight */

const sections=document.querySelectorAll("section[id]");
const navLinks=document.querySelectorAll(".nav-links a");

window.addEventListener("scroll",()=>{
let scrollY=window.pageYOffset;

sections.forEach(current=>{
const sectionHeight=current.offsetHeight;
const sectionTop=current.offsetTop-150;
const sectionId=current.getAttribute("id");

if(scrollY>sectionTop&&scrollY<=sectionTop+sectionHeight){
navLinks.forEach(link=>{
link.classList.remove("active");
if(link.getAttribute("href")==="#"+sectionId){
link.classList.add("active");
}
});
}
});
});

/* Modern Scroll Reveal */

const revealSections=document.querySelectorAll("section");

const revealOnScroll=()=>{
revealSections.forEach(section=>{
const sectionTop=section.getBoundingClientRect().top;
if(sectionTop<window.innerHeight-120){
section.classList.add("visible");
}
});
};

window.addEventListener("scroll",revealOnScroll);
window.addEventListener("load",revealOnScroll);

</script>

</body>
</html>
